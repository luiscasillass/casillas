<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Ruta Casillas — Colima · Manzanillo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --bg:#F5F3EE;--ink:#111010;--mid:#555048;--soft:#999188;--rule:#D8D4CC;
      --gold:#8A6A1A;--green:#2D6A4F;--green-light:#D8F3DC;
      --red:#9B2226;--red-light:#FFE8E8;--white:#FDFCF9;--skip:#BDB8B0;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
 
    /* ── LOGIN ── */
    #login-screen {
      position:fixed;inset:0;z-index:9999;
      background:var(--ink);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:0;
    }
    .login-box {
      width:100%;max-width:340px;padding:0 32px;
    }
    .login-logo {
      margin-bottom:40px;
      opacity:.7;
    }
    .login-logo svg { display:block; }
    .login-title {
      font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
      color:rgba(255,255,255,.3);margin-bottom:28px;
    }
    .login-field {
      margin-bottom:14px;
    }
    .login-field label {
      display:block;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;
      color:rgba(255,255,255,.25);margin-bottom:7px;
    }
    .login-field input {
      width:100%;padding:13px 14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:white;font-size:.9rem;font-family:inherit;
      outline:none;transition:border-color .2s;
      -webkit-appearance:none;border-radius:0;
    }
    .login-field input:focus { border-color:rgba(255,255,255,.35); }
    .login-field input::placeholder { color:rgba(255,255,255,.2); }
    .login-btn {
      width:100%;padding:14px;margin-top:8px;
      background:var(--white);color:var(--ink);
      border:none;cursor:pointer;
      font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
      font-family:inherit;transition:background .2s;
    }
    .login-btn:hover { background:#e8e5de; }
    .login-error {
      margin-top:14px;font-size:.72rem;
      color:#FF6B6B;text-align:center;
      opacity:0;transition:opacity .3s;
    }
    .login-error.show { opacity:1; }
    .login-footer {
      margin-top:48px;font-size:.58rem;letter-spacing:.12em;
      color:rgba(255,255,255,.12);text-align:center;
    }
 
    /* ── APP ── */
    #app {
      display:none;
      grid-template-columns:360px 1fr;
      height:100vh;
    }
    #app.visible { display:grid; }
    @media(max-width:768px){
      #app.visible{grid-template-columns:1fr;grid-template-rows:auto 1fr;overflow:hidden}
    }
 
    #sidebar{background:var(--white);border-right:1px solid var(--rule);display:flex;flex-direction:column;height:100vh;overflow:hidden}
    @media(max-width:768px){#sidebar{height:auto;max-height:46vh}}
 
    .sidebar-header{padding:16px 18px 12px;border-bottom:1px solid var(--rule);flex-shrink:0}
    .sidebar-header h1{font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink)}
    .sidebar-header p{font-size:.68rem;color:var(--soft);margin-top:2px}
    .week-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:var(--bg);border:1px solid var(--rule);padding:3px 10px;border-radius:20px;font-size:.62rem;color:var(--mid)}
    .week-badge b{color:var(--ink)}
 
    .progress-wrap{padding:10px 18px;border-bottom:1px solid var(--rule);flex-shrink:0}
    .progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .progress-label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
    .progress-count{font-size:.72rem;font-weight:700;color:var(--ink)}
    .progress-track{height:4px;background:var(--rule);border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .5s ease}
 
    .tabs{display:flex;border-bottom:1px solid var(--rule);flex-shrink:0}
    .tab{flex:1;padding:9px 0;text-align:center;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;transition:all .2s}
    .tab.active{color:var(--ink);border-bottom-color:var(--ink)}
    .tab-count{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;font-size:.58rem;margin-left:4px}
    #tab-pending .tab-count{background:var(--red-light);color:var(--red)}
    #tab-done .tab-count{background:var(--green-light);color:var(--green)}
    #tab-skip .tab-count{background:#EEEAE3;color:var(--skip)}
 
    #client-list{flex:1;overflow-y:auto;padding:4px 0}
 
    .client-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--rule);transition:background .15s}
    .client-item:hover{background:var(--bg)}
    .client-item.active{background:#F0EDE6}
    .client-num{width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0}
    .client-item.done .client-num{background:var(--green)}
    .client-item.skip .client-num{background:var(--skip)}
    .client-info{flex:1;min-width:0}
    .client-name{font-size:.78rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .client-item.skip .client-name{color:var(--soft);text-decoration:line-through}
    .client-sub{font-size:.65rem;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .client-order-prev{font-size:.62rem;color:var(--gold);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .check-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--rule);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;transition:all .2s;flex-shrink:0}
    .check-btn:hover{border-color:var(--green);color:var(--green)}
    .client-item.done .check-btn{background:var(--green);border-color:var(--green);color:white}
    .client-item.skip .check-btn{display:none}
 
    .logout-btn{margin:8px 14px 4px;padding:7px 0;background:none;border:1px solid var(--rule);color:var(--soft);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:calc(100% - 28px);transition:all .2s}
    .logout-btn:hover{border-color:var(--ink);color:var(--ink)}
    .reset-btn{margin:0 14px 8px;padding:7px 0;background:none;border:1px solid var(--rule);color:var(--soft);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:calc(100% - 28px);transition:all .2s}
    .reset-btn:hover{border-color:var(--red);color:var(--red)}
 
    #map{width:100%;height:100vh;z-index:1}
    @media(max-width:768px){#map{height:54vh}}
 
    #detail-card{position:fixed;bottom:0;left:360px;right:0;background:var(--white);border-top:1px solid var(--rule);transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);z-index:500;max-height:58vh;overflow-y:auto}
    #detail-card.open{transform:translateY(0)}
    @media(max-width:768px){#detail-card{left:0;bottom:54vh;max-height:46vh}}
 
    .detail-top{position:sticky;top:0;background:var(--white);border-bottom:1px solid var(--rule);padding:9px 14px;display:flex;justify-content:space-between;align-items:center}
    .detail-top span{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
    .detail-top button{background:none;border:none;cursor:pointer;font-size:.6rem;color:var(--soft);padding:3px 6px;letter-spacing:.08em;text-transform:uppercase}
    .detail-body{padding:16px 18px 22px}
    .detail-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
    .detail-num{width:38px;height:38px;border-radius:50%;background:var(--ink);color:white;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
    .detail-num.done{background:var(--green)}
    .detail-num.skip{background:var(--skip)}
    .detail-title h2{font-size:.95rem;font-weight:700;color:var(--ink)}
    .detail-title p{font-size:.68rem;color:var(--soft);margin-top:2px}
    .skip-notice{background:#F5F0E8;border:1px solid #E0D8C8;padding:10px 12px;margin-bottom:14px;font-size:.75rem;color:var(--mid)}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .dfield{padding:9px 11px;background:var(--bg);border:1px solid var(--rule)}
    .dfield-lbl{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);margin-bottom:2px}
    .dfield-val{font-size:.78rem;color:var(--ink);font-weight:500}
    .order-box{background:#FFF8EC;border:1px solid #E8D5A0;padding:11px 13px;margin-bottom:14px}
    .order-lbl{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
    .order-items{font-size:.8rem;color:var(--ink);line-height:1.85}
    .order-empty{font-size:.78rem;color:var(--soft);font-style:italic}
    .detail-actions{display:flex;gap:8px}
    .btn-deliver{flex:1;padding:12px;border:none;cursor:pointer;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--green);color:white;transition:background .2s}
    .btn-deliver:hover{background:#1B4332}
    .btn-deliver.delivered{background:var(--rule);color:var(--soft)}
    .btn-wa{padding:12px 14px;border:1px solid var(--rule);background:none;color:var(--ink);font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .2s}
    .btn-wa:hover{border-color:#25D366;color:#25D366}
 
    .mk{width:34px;height:34px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;color:white;font-size:.62rem;font-weight:700;cursor:pointer}
    .mk-active{width:42px;height:42px;font-size:.72rem;box-shadow:0 0 0 4px rgba(17,16,16,.15),0 4px 12px rgba(0,0,0,.28)}
    .mk-pending{background:var(--ink)}
    .mk-done{background:var(--green)}
    .mk-skip{background:var(--skip)}
 
    #toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--ink);color:white;padding:9px 18px;font-size:.7rem;letter-spacing:.06em;transition:transform .4s cubic-bezier(.22,1,.36,1);z-index:9999;white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0)}
    .leaflet-container{font-family:inherit}
  </style>
</head>
<body>
 
<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="36" height="48" viewBox="0 0 268 357" fill="rgba(255,255,255,0.6)" xmlns="http://www.w3.org/2000/svg">

    </div>
    <div class="login-title">Lácteos Casillas · Ruta</div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="pw-input" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>

  </div>
</div>
 
<!-- ── APP ── -->
<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>Ruta Casillas</h1>
      <p>Colima · Villa de Álvarez · Coquimatlán · Manzanillo</p>
      <div class="week-badge">Semana <b id="week-num">--</b> &nbsp;·&nbsp; <span id="week-type">--</span> &nbsp;·&nbsp; <span id="today-date">--</span></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label">Progreso del día</span>
        <span class="progress-count" id="progress-text">0 / 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('pending')" id="tab-pending">Pendientes <span class="tab-count" id="cnt-pending">0</span></button>
      <button class="tab" onclick="setTab('done')" id="tab-done">Entregados <span class="tab-count" id="cnt-done">0</span></button>
      <button class="tab" onclick="setTab('skip')" id="tab-skip">Quincenal <span class="tab-count" id="cnt-skip">0</span></button>
    </div>
    <div id="client-list"></div>
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar ruta del día</button>
    <button class="logout-btn" onclick="doLogout()">← Cerrar sesión</button>
  </div>
  <div id="map"></div>
</div>
 
<div id="detail-card">
  <div class="detail-top">
    <span id="detail-label">Cliente</span>
    <button onclick="closeDetail()">✕ Cerrar</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>
 
<div id="toast"></div>
 
<script>
// ── CONTRASEÑA ─────────────────────────────────────────────────────────────
// Cambia "casillas2024" por la contraseña que quieras
const PASSWORD = "casillas2024";
const SESSION_KEY = "ruta_auth";
 
function doLogin() {
  const val = document.getElementById('pw-input').value;
  const err = document.getElementById('login-error');
  if (val === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    initMap();
  } else {
    err.classList.add('show');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => err.classList.remove('show'), 2500);
  }
}
 
function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}
 
// Auto-login si ya tiene sesión activa (misma pestaña)
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
}
 
// ── SEMANA ────────────────────────────────────────────────────────────────
function getWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - y) / 86400000) + 1) / 7);
}

function fmtOrder(o) {
  const L = {CHI8:'Chihuahua 8kg',MOZ24:'Mozzarella 2.4kg',MOZ1:'Mozzarella 1kg',MOZ500:'Mozzarella 500g'};
  const r = Object.entries(o).filter(([k,v])=>v>0).map(([k,v])=>`${v} × ${L[k]}`);
  return r.length ? r : null;
}
function isSkip(c){ return c.freq==='Quincenal' && !ODD; }
 
let activeId=null, curTab='pending', map, markers={};
 
function initMap() {
  document.getElementById('week-num').textContent = WEEK;
  document.getElementById('week-type').textContent = ODD ? 'Semana non ✓' : 'Semana par';
  document.getElementById('today-date').textContent = TODAY.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});
 
  const saved = localStorage.getItem('ruta_casillas_v2');
  if (saved) JSON.parse(saved).forEach(s=>{ const c=CLIENTS.find(c=>c.id===s.id); if(c) c.done=s.done; });
 
  map = L.map('map',{zoomControl:false}).setView([19.15,-103.95],9);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'©OpenStreetMap ©CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
 
  const rc = CLIENTS.filter(c=>!isSkip(c)).map(c=>[c.lat,c.lng]);
  L.polyline(rc,{color:'#111010',weight:2,opacity:.18,dashArray:'5 8'}).addTo(map);
 
  CLIENTS.forEach(c=>addMarker(c));
  map.fitBounds(L.featureGroup(Object.values(markers)).getBounds().pad(.12));
  renderList(); updateProgress();
}
 
function mkClass(c){ if(isSkip(c)) return 'mk mk-skip'; if(c.done) return 'mk mk-done'; return 'mk mk-pending'; }
 
function addMarker(c) {
  const icon = L.divIcon({className:'',html:`<div class="${mkClass(c)}" id="mk-${c.id}">${c.done?'✓':c.id}</div>`,iconSize:[34,34],iconAnchor:[17,17]});
  markers[c.id] = L.marker([c.lat,c.lng],{icon,zIndexOffset:c.id*10}).addTo(map).on('click',()=>openDetail(c.id));
}
function refreshMarker(c){ map.removeLayer(markers[c.id]); delete markers[c.id]; addMarker(c); }
 
function renderList() {
  let list;
  if(curTab==='pending') list=CLIENTS.filter(c=>!c.done&&!isSkip(c));
  else if(curTab==='done') list=CLIENTS.filter(c=>c.done);
  else list=CLIENTS.filter(c=>isSkip(c));
  const el=document.getElementById('client-list');
  if(!list.length){
    el.innerHTML=`<div style="padding:28px 18px;text-align:center;color:var(--soft);font-size:.78rem;">${curTab==='pending'?'¡Ruta completada! 🎉':curTab==='done'?'Sin entregas aún':'Sin quincenales activos'}</div>`;
    return;
  }
  el.innerHTML=list.map(c=>{
    const skip=isSkip(c);
    const oi=fmtOrder(c.order);
    const prev=oi?oi[0]+(oi.length>1?` +${oi.length-1}`:''):'Pedido pendiente';
    return `<div class="client-item ${c.done?'done':''} ${skip?'skip':''} ${activeId===c.id?'active':''}" onclick="openDetail(${c.id})" id="li-${c.id}">
      <div class="client-num">${c.done?'✓':c.id}</div>
      <div class="client-info">
        <div class="client-name">${c.name}</div>
        <div class="client-sub">${c.municipio}</div>
        <div class="client-order-prev">${skip?'No se surte esta semana':prev}</div>
      </div>
      ${!skip?`<button class="check-btn" onclick="toggleDone(event,${c.id})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>`:''}
    </div>`;
  }).join('');
}
 
function updateProgress() {
  const active=CLIENTS.filter(c=>!isSkip(c));
  const done=active.filter(c=>c.done).length;
  const total=active.length;
  document.getElementById('progress-text').textContent=`${done} / ${total}`;
  document.getElementById('progress-fill').style.width=(total>0?Math.round(done/total*100):0)+'%';
  document.getElementById('cnt-pending').textContent=active.filter(c=>!c.done).length;
  document.getElementById('cnt-done').textContent=done;
  document.getElementById('cnt-skip').textContent=CLIENTS.filter(c=>isSkip(c)).length;
}
 
function openDetail(id) {
  const c=CLIENTS.find(c=>c.id===id); if(!c) return;
  activeId=id;
  map.flyTo([c.lat,c.lng],15,{duration:1});
  document.querySelectorAll('.mk').forEach(m=>m.classList.remove('mk-active'));
  const mk=document.getElementById(`mk-${id}`); if(mk) mk.classList.add('mk-active');
  document.querySelectorAll('.client-item').forEach(el=>el.classList.remove('active'));
  const li=document.getElementById(`li-${id}`); if(li){li.classList.add('active');li.scrollIntoView({behavior:'smooth',block:'nearest'});}
  const skip=isSkip(c); const oi=fmtOrder(c.order);
  const nc=c.done?'done':skip?'skip':'';
  const waMsg=encodeURIComponent('Hola, soy de Lácteos Casillas. Le confirmo su pedido del día.');
  const waHref=c.phone?`https://wa.me/52${c.phone.replace(/\D/g,'')}?text=${waMsg}`:'#';
  document.getElementById('detail-label').textContent=`${c.cid} — Parada #${c.id} · ${c.municipio}`;
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-header">
      <div class="detail-num ${nc}">${c.done?'✓':c.id}</div>
      <div class="detail-title"><h2>${c.name}</h2><p>${c.freq} · ${c.municipio}</p></div>
    </div>
    ${skip?`<div class="skip-notice">⏭ Semana par (#${WEEK}) — cliente quincenal, no se surte hoy.</div>`:''}
    <div class="detail-grid">
      <div class="dfield" style="grid-column:span 2"><div class="dfield-lbl">Dirección</div><div class="dfield-val">${c.address}</div></div>
      <div class="dfield"><div class="dfield-lbl">Teléfono</div><div class="dfield-val">${c.phone||'—'}</div></div>
      <div class="dfield"><div class="dfield-lbl">ID</div><div class="dfield-val">${c.cid}</div></div>
    </div>
    <div class="order-box">
      <div class="order-lbl">Pedido del día</div>
      ${oi?`<div class="order-items">${oi.map(i=>`• ${i}`).join('<br>')}</div>`:`<div class="order-empty">Sin pedido capturado aún</div>`}
    </div>
    ${!skip?`<div class="detail-actions">
      <button class="btn-deliver ${c.done?'delivered':''}" onclick="toggleDone(event,${c.id})">${c.done?'✓ Entregado — desmarcar':'✓ Marcar como entregado'}</button>
      ${c.phone?`<a class="btn-wa" href="${waHref}" target="_blank"><svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>WA</a>`:''}
    </div>`:''}`;
  document.getElementById('detail-card').classList.add('open');
}
 
function closeDetail(){ document.getElementById('detail-card').classList.remove('open'); document.querySelectorAll('.mk').forEach(m=>m.classList.remove('mk-active')); activeId=null; }
function toggleDone(e,id){ e.stopPropagation(); const c=CLIENTS.find(c=>c.id===id); if(!c||isSkip(c)) return; c.done=!c.done; save(); refreshMarker(c); renderList(); updateProgress(); if(activeId===id) openDetail(id); showToast(c.done?`✓ ${c.name} — entregado`:`↩ ${c.name} — pendiente`); }
function setTab(t){ curTab=t; document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active')); document.getElementById(`tab-${t}`).classList.add('active'); renderList(); }
function resetAll(){ if(!confirm('¿Reiniciar todas las entregas del día?')) return; CLIENTS.forEach(c=>c.done=false); localStorage.removeItem('ruta_casillas_v2'); CLIENTS.forEach(c=>refreshMarker(c)); renderList(); updateProgress(); closeDetail(); showToast('Ruta reiniciada'); }
function save(){ localStorage.setItem('ruta_casillas_v2',JSON.stringify(CLIENTS.map(c=>({id:c.id,done:c.done})))); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
 
// Init mapa si ya hay sesión
if(sessionStorage.getItem(SESSION_KEY)==='1') initMap();
